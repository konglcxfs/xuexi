services:
  postgres:
    image: postgres:16-alpine
    container_name: xuexi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xuexi
      POSTGRES_PASSWORD: xuexi_dev
      POSTGRES_DB: xuexi
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xuexi -d xuexi"]
      interval: 5s
      timeout: 5s
      retries: 10
